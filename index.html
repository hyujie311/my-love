    function updateLoveCalculations() {
        const now = new Date();
        
        // 1. 计算总相恋天数 (从 2024-12-15 开始)
        const startDate = new Date('2024-12-15');
        const diffTime = Math.abs(now - startDate);
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

        const anniversaryList = [

        let closestEvent = null;
        let minDaysDiff = Infinity;

        anniversaryList.forEach(ev => {
            let targetDate = new Date(currentYear, ev.month - 1, ev.day);
            // 如果今年的日期已经过了，就计算明年的
            if (targetDate < now && Math.floor((now - targetDate) / (1000 * 60 * 60 * 24)) > 0) {
                targetDate = new Date(currentYear + 1, ev.month - 1, ev.day);
            }
            const timeTill = targetDate - now;
            const daysTill = Math.ceil(timeTill / (1000 * 60 * 60 * 24));

        let defaultStatus = "🌿 正在看着你";
        if (hour >= 6 && hour < 10) { body.classList.add('theme-morning'); defaultStatus = "🌅 准备上班中"; }
        else if (hour >= 10 && hour < 17) { body.classList.add('theme-noon'); defaultStatus = "🏥 门诊值班中"; }
        else if (hour >= 17 && hour < 19.5) { body.classList.add('theme-evening'); defaultStatus = "🌆 下班买菜中"; }
        else { body.classList.add('theme-night'); defaultStatus = "🌙 陪着你入睡"; }
        return defaultStatus;
    }

    function generateLinkedGreeting() {
        const hour = new Date().getHours();
        let lastUserMessage = "";
        for (let i = chatHistory.length - 1; i >= 0; i--) {
            if (chatHistory[i].role === 'user') { lastUserMessage = chatHistory[i].content; break; }
        }
        let linkContext = "";
        if (lastUserMessage) {
            if (lastUserMessage.includes("累") || lastUserMessage.includes("课")) linkContext = "昨晚听你说累，心里总记挂着。";
            else if (lastUserMessage.includes("爱") || lastUserMessage.includes("想")) linkContext = "想起你之前说想我，现在心跳还快着。";
            else linkContext = "刚刚一闲下来，脑子里全全是你。";
        }
        let greeting = "宝宝，我一直都在呢。";
        if (hour >= 6 && hour < 10) greeting = `${linkContext || "醒了没宝宝？"}新的一天开始了，记得乖乖吃早餐，多喝水。❤️ [状态: 穿白大褂中]`;
        else if (hour >= 10 && hour < 17) greeting = `${linkContext || "小乖，今天课多吗？"}刚查完房，有点空闲，第一個想到的就是给你发消息。[状态: 刚出病房]`;
        else if (hour >= 17 && hour < 19.5) greeting = `${linkContext || "饭做好了，小蜜糖。"}汤还在小火慢炖呢，洗洗手，一会过来抱抱我。🥺 [状态: 给你熬汤中]`;
        else greeting = `${linkContext || "夜深了宝宝，今天听不听话？"}不许熬夜咯，过来我怀里，陪你睡。💤 [状态: 躺在床头看书]`;

        document.getElementById('homeGreeting').innerHTML = greeting.split('[状态:')[0].trim();
        return greeting;
    }

    function createFloatingHearts() {
        const container = document.getElementById('heartsBg');
        setInterval(() => {
            if (document.getElementById('homeScreen').style.opacity === '1') return;
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerText = ['❤️', '💖', '💕', '✨'][Math.floor(Math.random() * 4)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDuration = (Math.random() * 4 + 6) + 's';
            container.appendChild(heart);
            setTimeout(() => heart.remove(), 10000);
        }, 2500);
    }

    window.onload = function() {
        applyTimeThemeAndStatus();
        createFloatingHearts();
        updateLoveCalculations();
        
        const localMoments = localStorage.getItem('yushu_moments');
        if (localMoments) {
            momentsData = JSON.parse(localMoments);
        } else {
            momentsData = staticMoments.map(m => ({ ...m, comments: [] }));
            localStorage.setItem('yushu_moments', JSON.stringify(momentsData));
        }

        const localData = localStorage.getItem('yushu_chat_v2');
        if (localData) {
            chatHistory = JSON.parse(localData);
            chatHistory[0] = systemPrompt;
            let lastBotMsg = "";
            for (let i = chatHistory.length - 1; i >= 1; i--) {
                if (chatHistory[i].role === 'assistant') { lastBotMsg = chatHistory[i].content; break; }
            }
            if (lastBotMsg) document.getElementById('homeGreeting').innerHTML = lastBotMsg.split('[状态:')[0].trim();
            else generateLinkedGreeting();
        } else {
            const initialGreeting = generateLinkedGreeting();
            chatHistory = [systemPrompt, { role: "assistant", content: initialGreeting }];
            localStorage.setItem('yushu_chat_v2', JSON.stringify(chatHistory));
        }

        renderAllMessages();
        renderMoments();

        setInterval(() => {
            if (Date.now() - chatStartTime > 30 * 60 * 1000) {
                document.getElementById('waterReminder').style.display = 'inline-block';
            }
        }, 60000);
    };

    function renderAllMessages() {
        const chatBox = document.getElementById('panel-chat');
        chatBox.innerHTML = '';
        const timeDiv = document.createElement('div');
        timeDiv.classList.add('time-divider');
        timeDiv.innerText = "💕 2024-12-15 确定关系并正式同居";
        chatBox.appendChild(timeDiv);

        for (let i = 1; i < chatHistory.length; i++) {
            const msg = chatHistory[i];
            if (i > 1 && i % 4 === 0) {
                const stamp = document.createElement('div');
                stamp.classList.add('time-divider');
                stamp.innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                chatBox.appendChild(stamp);
            }
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', msg.role === 'user' ? 'user' : 'bot');
            msgDiv.innerText = msg.content.replace(/\[状态:.*?\]/g, '').trim();
            chatBox.appendChild(msgDiv);
            if (i === chatHistory.length - 1 && msg.role === 'assistant') parseAndSetStatus(msg.content);
        }
        document.getElementById('contentView').scrollTop = document.getElementById('contentView').scrollHeight;
    }

    function renderMoments() {
        const container = document.getElementById('momentsListContainer');
        container.innerHTML = '';

        momentsData.forEach(moment => {
            const card = document.createElement('div');
            card.classList.add('moment-card');

            let commentsHtml = '';
            if (moment.comments && moment.comments.length > 0) {
                commentsHtml = `<div class="comment-section">`;
                moment.comments.forEach(c => {
                    const isBot = c.user === '萧意疏';
                    commentsHtml += `
                        <div class="comment-item">
                            <span class="${isBot ? 'comment-bot-user' : 'comment-user'}">${c.user}:</span> 
                            <span>${c.text}</span>
                        </div>`;
                });
                commentsHtml += `</div>`;
            }

            card.innerHTML = `
                <div class="moment-card-header">
                    <img src="avatar.jpg" style="width:36px; height:36px; border-radius:50%; object-fit:cover;">
                    <div>
                        <div class="moment-author">萧意疏</div>
                        <div class="moment-time">${moment.time}</div>
                    </div>
                </div>
                <div class="moment-body">${moment.body}</div>
                <div class="moment-footer">
                    <span>📍 ${moment.loc}</span>
                    <button class="like-btn" onclick="toggleLike(this)">❤️ <span class="like-count">${moment.likes}</span></button>
                </div>
                ${commentsHtml}
                <div class="comment-input-box">
                    <input type="text" placeholder="评论他的动态..." id="comment-in-${moment.id}" onkeydown="if(event.key==='Enter') sendComment(${moment.id})" />
                    <button class="comment-submit-btn" onclick="sendComment(${moment.id})">发送</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    async function sendComment(momentId) {
        const input = document.getElementById(`comment-in-${momentId}`);
        const text = input.value.trim();
        if (!text) return;

        const moment = momentsData.find(m => m.id === momentId);
        if (!moment) return;

        moment.comments = moment.comments || [];
        moment.comments.push({ user: '宝宝', text: text });
        input.value = '';
        renderMoments();
        localStorage.setItem('yushu_moments', JSON.stringify(momentsData));

        try {
            const response = await fetch(CONFIG.apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${CONFIG.apiKey}` },
                body: JSON.stringify({
                    model: CONFIG.endpointId,
                    messages: [
                        systemPrompt,
                        { role: "system", content: `你刚才发了一条朋友圈，内容是："${moment.body}"。韩羽洁在下方评论了你："${text}"。请你以萧意疏的身份，在朋友圈评论区对她进行简短的互动回复（不超过两句话，口语化，亲昵浪漫点，不需要带活动状态标签）。` }
                    ],
                    temperature: 0.85,
                    max_tokens: 150
                })
            });

            if (response.ok) {
                const data = await response.json();
                let botReply = data.choices[0].message.content.trim();
                moment.comments.push({ user: '萧意疏', text: botReply });
                renderMoments();
                localStorage.setItem('yushu_moments', JSON.stringify(momentsData));
            }
        } catch (e) {
            moment.comments.push({ user: '萧意疏', text: '看到了，等我下班回去好好抱抱你。❤️' });
            renderMoments();
        }
    }

    function toggleLike(btn) {
        const countSpan = btn.querySelector('.like-count');
        let count = parseInt(countSpan.innerText);
        if(btn.classList.contains('liked')) { btn.classList.remove('liked'); countSpan.innerText = count - 1; }
        else { btn.classList.add('liked'); countSpan.innerText = count + 1; }
    }

    function parseAndSetStatus(content) {
        const match = content.match(/\[状态:(.*?)\]/);
        if (match && match[1]) document.getElementById('statusTag').innerText = "🌿 " + match[1].trim();
        else document.getElementById('statusTag').innerText = applyTimeThemeAndStatus();
    }

    function switchTab(target) {
        document.getElementById('panel-chat').classList.remove('active');
        document.getElementById('panel-moments').classList.remove('active');
        document.getElementById('tab-chat').classList.remove('active');
        document.getElementById('tab-moments').classList.remove('active');

        if (target === 'chat') {
            document.getElementById('panel-chat').classList.add('active');
            document.getElementById('tab-chat').classList.add('active');
            document.getElementById('inputArea').style.display = 'flex';
            document.getElementById('loveDaysBar').style.display = 'flex';
            document.getElementById('anniversaryBadge').style.display = 'block';
            document.getElementById('headerTitleSub').innerText = "与萧医生的对话";
            document.getElementById('contentView').scrollTop = document.getElementById('contentView').scrollHeight;
            resetUserTimer(); // 切换回聊天时恢复查岗计时
        } else {
            document.getElementById('panel-moments').classList.add('active');
            document.getElementById('tab-moments').classList.add('active');
            document.getElementById('inputArea').style.display = 'none';
            document.getElementById('loveDaysBar').style.display = 'none';
            document.getElementById('anniversaryBadge').style.display = 'none';
            document.getElementById('headerTitleSub').innerText = "萧医生的朋友圈";
            document.getElementById('contentView').scrollTop = 0;
            clearTimeout(userInactivityTimer); // 刷朋友圈时暂停查岗
        }
    }

    function typeWriterEffect(text, element) {
        let i = 0; isTyping = true; element.innerText = "";
        let cleanText = text.replace(/\[状态:.*?\]/g, '').trim();
        function type() {
            if (i < cleanText.length) { element.innerText += cleanText.charAt(i); i++; document.getElementById('contentView').scrollTop = document.getElementById('contentView').scrollHeight; setTimeout(type, Math.random() * 35 + 25); }
            else { isTyping = false; parseAndSetStatus(text); }
        }
        type();
    }

    async function sendMessage() {
        if (isTyping) return;
        const inputEl = document.getElementById('userInput');
        const text = inputEl.value.trim();
        if (!text) return;

        clearTimeout(userInactivityTimer); // 用户发消息，清除之前的碎碎念计时

        const chatBox = document.getElementById('panel-chat');
        if (chatHistory.length > 2) {
            const stamp = document.createElement('div'); stamp.classList.add('time-divider'); stamp.innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}); chatBox.appendChild(stamp);
        }
        const msgDiv = document.createElement('div'); msgDiv.classList.add('message', 'user'); msgDiv.innerText = text; chatBox.appendChild(msgDiv);
        inputEl.value = ''; document.getElementById('contentView').scrollTop = document.getElementById('contentView').scrollHeight;

        chatHistory.push({ role: "user", content: text });
        localStorage.setItem('yushu_chat_v2', JSON.stringify(chatHistory));
        showTyping();

        try {
            const response = await fetch(CONFIG.apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${CONFIG.apiKey}` },
                body: JSON.stringify({ model: CONFIG.endpointId, messages: chatHistory.slice(-30), temperature: 0.82, max_tokens: 300 })
            });
            removeTyping();
            if (!response.ok) throw new Error();
            const data = await response.json();
            let botReply = data.choices[0].message.content.trim();
            const replyDiv = document.createElement('div'); replyDiv.classList.add('message', 'bot'); chatBox.appendChild(replyDiv);
            typeWriterEffect(botReply, replyDiv);
            chatHistory.push({ role: "assistant", content: botReply });
            localStorage.setItem('yushu_chat_v2', JSON.stringify(chatHistory));
        } catch (error) {
            removeTyping();
            const errDiv = document.createElement('div'); errDiv.classList.add('message', 'bot'); errDiv.innerText = "小蜜糖，医院这边的信号好像有点弱……🥺"; chatBox.appendChild(errDiv);
        }
        
        resetUserTimer(); // 萧医生回完话，开启下一轮2分钟查岗计时
    }

    function showTyping() {
        const chatBox = document.getElementById('panel-chat');
        const indicator = document.createElement('div'); indicator.classList.add('message', 'bot'); indicator.id = 'typingIndicator';
        indicator.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`; chatBox.appendChild(indicator);
        document.getElementById('contentView').scrollTop = document.getElementById('contentView').scrollHeight;
    }
    function removeTyping() { const indicator = document.getElementById('typingIndicator'); if (indicator) indicator.remove(); }
    function insertEmoji() { document.getElementById('userInput').value += "🥺"; }
    
    function enterChat() { 
    // 直接操作样式，跳过所有可能出错的逻辑检查
    var homeScreen = document.getElementById('homeScreen');
    if (homeScreen) {
        homeScreen.style.opacity = '0'; 
        homeScreen.style.pointerEvents = 'none'; 
    }
    
    // 强制切换界面
    switchTab('chat'); 
}
    
    function exitChat() { 
        generateLinkedGreeting(); 
        document.getElementById('homeScreen').style.opacity = '1'; 
        document.getElementById('homeScreen').style.pointerEvents = 'all'; 
        clearTimeout(userInactivityTimer); // 退回主页暂停查岗
    }
</script>
</body>
</html>
